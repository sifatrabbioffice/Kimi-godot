# =====================================================================
# Godot Editor for iOS — GitHub Actions workflow (IPA builder)
#
# এই workflow Godot-এর নিজস্ব configure টুল ব্যবহার করে Xcode project
# বানায়, তাই placeholder নিয়ে কোনো সমস্যা হবে না।
#
# ব্যবহার:
#   1. এই ফাইলটা repo-তে রাখুন: .github/workflows/godot-ios-editor.yml
#   2. GitHub → Actions → "Godot iOS Editor (IPA)" → Run workflow
#   3. Run শেষে Artifacts থেকে IPA ডাউনলোড করে AltStore/SideStore-এ দিন
# =====================================================================

name: Godot iOS Editor (IPA)

on:
  workflow_dispatch:
    inputs:
      godot_ref:
        description: "Godot tag/branch (e.g. 4.7.1-stable)"
        required: true
        default: "4.7.1-stable"

env:
  GODOT_REF: ${{ inputs.godot_ref }}
  APP_DIR: ios_app
  BINARY: godot

jobs:
  build:
    name: Build Godot Editor IPA
    runs-on: macos-15
    timeout-minutes: 300

    steps:
      - name: Prepare tools
        run: |
          set -e
          python3 -m venv venv
          echo "$PWD/venv/bin" >> $GITHUB_PATH
          source venv/bin/activate
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet scons pillow
          scons --version | head -n 2
          xcodebuild -version

      - name: Clone Godot source
        run: git clone --depth 1 --branch "$GODOT_REF" https://github.com/godotengine/godot.git godot

      # iOS-এ editor spawn করতে পারে না, তাই boot-এই editor চালু করার patch
      - name: Patch engine (boot straight into editor)
        working-directory: godot
        run: |
          cat > /tmp/ios_editor.patch << 'PATCH_EOF'
          diff --git a/drivers/apple_embedded/main_utilities.mm b/drivers/apple_embedded/main_utilities.mm
          index 0000000..0000000 100644
          --- a/drivers/apple_embedded/main_utilities.mm
          +++ b/drivers/apple_embedded/main_utilities.mm
          @@ -35,6 +35,28 @@
           
           #include <cstdio>
           
          +static NSString *godot_documents_dir(void) {
          +	return [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];
          +}
          +
          +// প্রথম launch-এ bundled demo_project কে Documents-এ copy করে
          +static void godot_bootstrap_project(void) {
          +	NSString *proj = [[[NSBundle mainBundle] infoDictionary] objectForKey:@"godot_editor_bootstrap_project"];
          +	if (!proj || [proj length] == 0) return;
          +	NSFileManager *fm = [NSFileManager defaultManager];
          +	NSString *dst = [godot_documents_dir() stringByAppendingPathComponent:proj];
          +	if ([fm fileExistsAtPath:dst]) return;
          +	NSString *src = [[NSBundle mainBundle] pathForResource:proj ofType:nil];
          +	if (src) [fm copyItemAtPath:src toPath:dst error:nil];
          +}
          +
           void change_to_launch_dir(char **p_args) {
           	size_t len = strlen(p_args[0]);
           
          @@ -61,7 +83,11 @@
           		NSString *str = [arr objectAtIndex:i];
           		if (!str) continue;
          +		// $DOCS/ → real Documents path
          +		if ([str hasPrefix:@"$DOCS/"]) {
          +			str = [godot_documents_dir() stringByAppendingPathComponent:[str substringFromIndex:6]];
          +		}
           		p_args[p_argc++] = (char *)[str cStringUsingEncoding:NSUTF8StringEncoding];
           	}
           
          @@ -72,6 +98,7 @@
           }
           
           int process_args(int p_argc, char **p_args, char **r_args) {
          +	godot_bootstrap_project();
           	for (int i = 0; i < p_argc; i++) r_args[i] = p_args[i];
           	}
          PATCH_EOF
          git apply --check /tmp/ios_editor.patch
          git apply /tmp/ios_editor.patch
          echo "Patch applied OK"

      - name: Compile Godot editor library (iOS arm64)
        working-directory: godot
        run: |
          set -e
          scons platform=ios target=editor arch=arm64 vulkan=no debug_symbols=no -j"$(sysctl -n hw.logicalcpu)"
          ls -lh bin/

      - name: Copy Xcode template and clean up
        run: |
          set -e
          cp -R "godot/misc/dist/apple_embedded_xcode" "$APP_DIR"
          # অপ্রয়োজনীয় xcframeworks সরান
          rm -rf "$APP_DIR"/libgodot.visionos.debug.xcframework \
                 "$APP_DIR"/libgodot.visionos.release.xcframework \
                 "$APP_DIR"/libgodot_camera.ios.debug.xcframework \
                 "$APP_DIR"/libgodot_camera.ios.release.xcframework \
                 "$APP_DIR"/libgodot_camera.visionos.debug.xcframework \
                 "$APP_DIR"/libgodot_camera.visionos.release.xcframework \
                 "$APP_DIR"/libgodot.ios.debug.xcframework \
                 "$APP_DIR"/libgodot.ios.release.xcframework

      - name: Build Godot's configure tool
        working-directory: ios_app
        run: |
          clang configure.c -o configure
          ./configure --help 2>&1 || true

      - name: Run configure to generate valid Xcode project
        working-directory: ios_app
        run: |
          # configure টুলই project.pbxproj ও Info.plist ঠিক করে দেবে
          ./configure \
            --app_name "Godot Editor" \
            --bundle_identifier "org.godotengine.ioseditor" \
            --target editor \
            --arch arm64 \
            --vulkan no \
            --deployment_target 15.0 \
            --device_family "1,2" \
            --short_version "4.7.1" \
            --version "4.7.1" \
            --team "" \
            --provisioning_profile_uuid_debug "" \
            --provisioning_profile_uuid_release "" \
            --code_sign_identity_debug "" \
            --code_sign_identity_release "" \
            --code_sign_style_debug Manual \
            --code_sign_style_release Manual \
            --docs_in_place true \
            --docs_sharing true \
            --required_device_capabilities arm64 \
            --camera_usage_description "Godot projects can use the camera." \
            --photolibrary_usage_description "Godot projects can use the photo library." \
            --microphone_usage_description "Godot projects can use the microphone."

      - name: Place editor library
        run: |
          set -e
          LIB="$(ls godot/bin/libgodot.ios.editor.arm64*.a | head -n1)"
          echo "Using library: $LIB"
          mkdir -p "$APP_DIR/godot.xcframework/ios-arm64"
          cp "$LIB" "$APP_DIR/godot.xcframework/ios-arm64/libgodot.a"
          cat > "$APP_DIR/godot.xcframework/Info.plist" << 'XCF_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>AvailableLibraries</key>
          	<array>
          		<dict>
          			<key>LibraryIdentifier</key>
          			<string>ios-arm64</string>
          			<key>LibraryPath</key>
          			<string>libgodot.a</string>
          			<key>SupportedArchitectures</key>
          			<array><string>arm64</string></array>
          			<key>SupportedPlatform</key>
          			<string>ios</string>
          		</dict>
          	</array>
          	<key>CFBundlePackageType</key>
          	<string>XFWK</string>
          	<key>XCFrameworkFormatVersion</key>
          	<string>1.0</string>
          </dict>
          </plist>
          XCF_EOF
          mv "$APP_DIR/data.pck" "$APP_DIR/godot.pck"

      - name: Set editor launch arguments (Info.plist)
        run: |
          PLIST="$APP_DIR/godot_apple_embedded/godot_apple_embedded-Info.plist"
          /usr/libexec/PlistBuddy -c "Add :godot_editor_bootstrap_project string demo_project" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:0 string --editor" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:1 string --single-window" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:2 string --path" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:3 string \$DOCS/demo_project" "$PLIST"
          echo "Launch arguments set."

      - name: Create bundled demo project
        run: |
          mkdir -p demo_project
          cat > demo_project/project.godot << 'PG_EOF'
          ; Engine configuration file.
          config_version=5
          [application]
          config/name="iOS Demo"
          run/main_scene="res://main.tscn"
          [rendering]
          renderer/rendering_method="mobile"
          PG_EOF
          cat > demo_project/main.tscn << 'TSCN_EOF'
          [gd_scene format=3]
          [node name="Main" type="Node2D"]
          [node name="Label" type="Label" parent="."]
          offset_left = 60.0
          offset_top = 60.0
          theme_override_font_sizes/font_size = 40
          text = "Godot iOS Editor is working!"
          TSCN_EOF

      - name: Generate app icon
        run: |
          python3 << 'PYEOF'
          import os, json
          from PIL import Image, ImageDraw

          base = "ios_app/godot_apple_embedded/Images.xcassets/AppIcon.appiconset"
          os.makedirs(base, exist_ok=True)
          img = Image.new("RGB", (1024, 1024), (71, 140, 191))
          d = ImageDraw.Draw(img)
          d.ellipse([212, 212, 812, 812], fill=(255, 255, 255))
          d.ellipse([402, 402, 622, 622], fill=(71, 140, 191))
          img.save(os.path.join(base, "icon_1024.png"))
          json.dump({
              "images": [{"filename": "icon_1024.png", "idiom": "universal",
                          "platform": "ios", "size": "1024x1024"}],
              "info": {"author": "xcode", "version": 1}
          }, open(os.path.join(base, "Contents.json"), "w"))
          print("AppIcon ready")
          PYEOF

      - name: Build .app with Xcode (unsigned)
        run: |
          set -e
          xcodebuild \
            -project "$APP_DIR/godot_apple_embedded.xcodeproj" \
            -scheme godot_apple_embedded \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$APP_DIR/dd" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            VALIDATE_PRODUCT=NO \
            ONLY_ACTIVE_ARCH=YES \
            build
          ls -lh "$APP_DIR/dd/Build/Products/Release-iphoneos/"

      - name: Package IPA
        run: |
          APP="$APP_DIR/dd/Build/Products/Release-iphoneos/$BINARY.app"
          cp -R demo_project "$APP/demo_project"
          codesign --force --deep --sign - "$APP" 2>/dev/null || echo "ad-hoc codesign skipped"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          IPA="GodotEditor-iOS-${GODOT_REF}.ipa"
          zip -qry "$IPA" Payload
          ls -lh "$IPA"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodotEditor-iOS-ipa
          path: GodotEditor-iOS-*.ipa
          retention-days: 14

      - name: Build summary
        run: |
          {
            echo "## Godot iOS Editor — IPA ready"
            echo ""
            echo "- Godot version: \`${GODOT_REF}\`"
            echo "- Download artifact: **GodotEditor-iOS-ipa**"
            echo "- Install with: AltStore / SideStore / Sideloadly / TrollStore"
          } >> "$GITHUB_STEP_SUMMARY"
