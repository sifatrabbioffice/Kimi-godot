# =====================================================================
# Godot Editor for iOS — GitHub Actions workflow (IPA builder)
#
# iPad/iPhone-এ চালানোর জন্য Godot editor-এর unsigned IPA বিল্ড করে।
#
# ব্যাবহার:
#   1. এই ফাইলটা আপনার repo-তে রাখুন: .github/workflows/godot-ios-editor.yml
#   2. GitHub → Actions → "Godot iOS Editor (IPA)" → Run workflow
#   3. Run শেষ হলে Artifacts থেকে GodotEditor-iOS-ipa ডাউনলোড করুন
#   4. IPA টা AltStore / SideStore / Sideloadly / TrollStore দিয়ে install করুন
#
# সতর্কতা: ফাইলের indentation (space) আর engine patch-এর TAB নষ্ট করবেন না।
# =====================================================================

name: Godot iOS Editor (IPA)

on:
  workflow_dispatch:
    inputs:
      godot_ref:
        description: "Godot tag/branch (e.g. 4.7.1-stable)"
        required: true
        default: "4.7.1-stable"

env:
  GODOT_REF: ${{ inputs.godot_ref }}
  APP_DIR: ios_app
  BINARY: godot

jobs:
  build:
    name: Build Godot Editor IPA
    runs-on: macos-15
    timeout-minutes: 300

    steps:
      - name: Prepare tools
        run: |
          set -e
          python3 -m venv venv
          echo "$PWD/venv/bin" >> $GITHUB_PATH
          source venv/bin/activate
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet scons pillow
          scons --version | head -n 2
          xcodebuild -version

      - name: Clone Godot source
        run: git clone --depth 1 --branch "$GODOT_REF" https://github.com/godotengine/godot.git godot

      - name: Patch engine (boot straight into editor)
        working-directory: godot
        run: |
          set -e
          python3 << 'PYEOF'
          import os

          filepath = "drivers/apple_embedded/main_utilities.mm"
          with open(filepath, "r") as f:
              content = f.read()

          if "godot_bootstrap_project" in content:
              print("Already patched, skipping.")
              exit(0)

          include_line = '#include <cstdio>'
          if include_line not in content:
              print("ERROR: Could not find '#include <cstdio>'")
              exit(1)

          new_code = """
static NSString *godot_documents_dir(void) {
    return [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];
}

static void godot_bootstrap_project(void) {
    NSString *proj = [[[NSBundle mainBundle] infoDictionary] objectForKey:@"godot_editor_bootstrap_project"];
    if (!proj || [proj length] == 0) {
        return;
    }
    NSFileManager *fm = [NSFileManager defaultManager];
    NSString *dst = [godot_documents_dir() stringByAppendingPathComponent:proj];
    if ([fm fileExistsAtPath:dst]) {
        return;
    }
    NSString *src = [[NSBundle mainBundle] pathForResource:proj ofType:nil];
    if (src) {
        [fm copyItemAtPath:src toPath:dst error:nil];
    }
}
"""
          content = content.replace(include_line, include_line + new_code)

          old_process = "int process_args(int p_argc, char **p_args, char **r_args) {"
          new_process = "int process_args(int p_argc, char **p_args, char **r_args) {
    godot_bootstrap_project();"
          if old_process not in content:
              print("ERROR: Could not find process_args function")
              exit(1)
          content = content.replace(old_process, new_process)

          # Add $DOCS expansion before cStringUsingEncoding line
          lines = content.split('
')
          new_lines = []
          for line in lines:
              new_lines.append(line)
              if 'cStringUsingEncoding:NSUTF8StringEncoding' in line and 'p_args[p_argc++]' in line:
                  indent = '    '
                  new_lines.insert(-1, indent + "// Expand $DOCS/ to Documents directory")
                  new_lines.insert(-1, indent + 'if ([str hasPrefix:@"$DOCS/"]) {')
                  new_lines.insert(-1, indent + '    str = [godot_documents_dir() stringByAppendingPathComponent:[str substringFromIndex:6]];')
                  new_lines.insert(-1, indent + '}')
          content = '
'.join(new_lines)

          with open(filepath, "w") as f:
              f.write(content)
          print("Patch applied OK")
          PYEOF

      - name: Compile Godot editor library (iOS arm64)
        working-directory: godot
        run: |
          set -e
          scons platform=ios target=editor arch=arm64 vulkan=no debug_symbols=no -j"$(sysctl -n hw.logicalcpu)"
          ls -lh bin/

      - name: Assemble Xcode project with editor library
        run: |
          set -e
          LIB="$(ls godot/bin/libgodot.ios.editor.arm64*.a | head -n1)"
          echo "Editor library: $LIB"
          cp -R "godot/misc/dist/apple_embedded_xcode" "$APP_DIR"
          rm -rf "$APP_DIR"/libgodot.visionos.debug.xcframework                  "$APP_DIR"/libgodot.visionos.release.xcframework                  "$APP_DIR"/libgodot_camera.ios.debug.xcframework                  "$APP_DIR"/libgodot_camera.ios.release.xcframework                  "$APP_DIR"/libgodot_camera.visionos.debug.xcframework                  "$APP_DIR"/libgodot_camera.visionos.release.xcframework                  "$APP_DIR"/libgodot.ios.debug.xcframework                  "$APP_DIR"/libgodot.ios.release.xcframework
          mkdir -p "$APP_DIR/godot.xcframework/ios-arm64"
          cp "$LIB" "$APP_DIR/godot.xcframework/ios-arm64/libgodot.a"
          cat > "$APP_DIR/godot.xcframework/Info.plist" << 'XCF_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>AvailableLibraries</key>
              <array>
                  <dict>
                      <key>LibraryIdentifier</key>
                      <string>ios-arm64</string>
                      <key>LibraryPath</key>
                      <string>libgodot.a</string>
                      <key>SupportedArchitectures</key>
                      <array>
                          <string>arm64</string>
                      </array>
                      <key>SupportedPlatform</key>
                      <string>ios</string>
                  </dict>
              </array>
              <key>CFBundlePackageType</key>
              <string>XFWK</string>
              <key>XCFrameworkFormatVersion</key>
              <string>1.0</string>
          </dict>
          </plist>
          XCF_EOF
          mv "$APP_DIR/data.pck" "$APP_DIR/godot.pck"

      - name: Fill template placeholders
        run: |
          python3 << 'PYEOF'
          import os, re, pathlib

          APP = "ios_app"

          R = [
              ("$pbx_launch_screen_file_reference", '90DD2D9D24B36E8000717FE1 /* Launch Screen.storyboard */ = {isa = PBXFileReference; fileEncoding = 4; lastKnownFileType = file.storyboard; path = "Launch Screen.storyboard"; sourceTree = "<group>"; };'),
              ("$pbx_launch_screen_copy_files", "90DD2D9D24B36E8000717FE1 /* Launch Screen.storyboard */,"),
              ("$pbx_launch_screen_build_phase", "90DD2D9E24B36E8000717FE1 /* Launch Screen.storyboard in Resources */,"),
              ("$pbx_launch_screen_build_reference", "90DD2D9E24B36E8000717FE1 /* Launch Screen.storyboard in Resources */ = {isa = PBXBuildFile; fileRef = 90DD2D9D24B36E8000717FE1 /* Launch Screen.storyboard */; };"),
              ("$plist_launch_screen_name", "<key>UILaunchStoryboardName</key><string>Launch Screen</string>"),
              ("$launch_screen_image_mode", "center"),
              ("$launch_screen_background_color", 'red="0.10" green="0.11" blue="0.14" alpha="1"'),
              ("$moltenvk_buildfile", ""), ("$moltenvk_fileref", ""),
              ("$moltenvk_buildphase", ""), ("$moltenvk_buildgrp", ""),
              ("$modules_buildfile", ""), ("$modules_fileref", ""),
              ("$modules_buildphase", ""), ("$modules_buildgrp", ""),
              ("$additional_pbx_files", ""), ("$additional_pbx_frameworks_build", ""),
              ("$additional_pbx_frameworks_refs", ""), ("$additional_pbx_resources_refs", ""),
              ("$additional_pbx_resources_build", ""),
              ("$pbx_locale_file_reference", ""), ("$pbx_locale_build_reference", ""),
              ("$pbx_embeded_frameworks", ""),
              ("$os_deployment_target", "IPHONEOS_DEPLOYMENT_TARGET = 15.0;"),
              ("$targeted_device_family", "1,2"),
              ("$valid_archs", "arm64"),
              ("$godot_archs", "arm64"),
              ("$linker_flags", ""),
              ("$sdkroot", "iphoneos"),
              ("$team_id", ""),
              ("$code_sign_identity_debug", ""), ("$code_sign_identity_release", ""),
              ("$code_sign_style_debug", "Manual"), ("$code_sign_style_release", "Manual"),
              ("$provisioning_profile_uuid_debug", ""), ("$provisioning_profile_uuid_release", ""),
              ("$provisioning_profile_specifier_debug", ""), ("$provisioning_profile_specifier_release", ""),
              ("$bundle_identifier", "org.godotengine.ioseditor"),
              ("$short_version", "4.7.1"), ("$version", "4.7.1"),
              ("$signature", "????"),
              ("$docs_in_place", "<true/>"), ("$docs_sharing", "<true/>"),
              ("$required_device_capabilities", "<string>arm64</string>"),
              ("$camera_usage_description", "Godot projects can use the camera."),
              ("$photolibrary_usage_description", "Godot projects can use the photo library."),
              ("$microphone_usage_description", "Godot projects can use the microphone."),
              ("$interface_orientations", "<string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationPortraitUpsideDown</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string>"),
              ("$ipad_interface_orientations", "<string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationPortraitUpsideDown</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string>"),
              ("$additional_plist_content", ""),
              ("$entitlements_full", ""),
              ("$cpp_code", ""),
              ("$default_build_config", "Release"),
              ("$binary", "godot"),
              ("$name", "Godot Editor"),
              ("$godot_path", "godot"),
              ("$godot_name", "Godot Editor"),
              ("$godot_binary", "godot"),
              ("$export_method", "development"),
              ("$plist_bundle_identifier", "org.godotengine.ioseditor"),
              ("$plist_bundle_name", "Godot Editor"),
              ("$plist_bundle_display_name", "Godot Editor"),
              ("$plist_bundle_version", "4.7.1"),
              ("$plist_bundle_short_version", "4.7.1"),
          ]

          EXTS = {".pbxproj", ".xcscheme", ".plist", ".storyboard", ".strings",
                  ".swift", ".cpp", ".h", ".entitlements", ".xcworkspacedata"}

          changed = 0
          for p in pathlib.Path(APP).rglob("*"):
              if not p.is_file() or p.suffix not in EXTS:
                  continue
              t = p.read_text(encoding="utf-8")
              o = t
              for k, v in R:
                  t = t.replace(k, v)
              if t != o:
                  p.write_text(t, encoding="utf-8")
                  changed += 1
          print("placeholder-processed files:", changed)

          if os.path.exists(f"{APP}/godot_apple_embedded"):
              os.rename(f"{APP}/godot_apple_embedded", f"{APP}/godot")
          if os.path.exists(f"{APP}/godot/godot_apple_embedded-Info.plist"):
              os.rename(f"{APP}/godot/godot_apple_embedded-Info.plist", f"{APP}/godot/godot-Info.plist")
          if os.path.exists(f"{APP}/godot/godot_apple_embedded.entitlements"):
              os.rename(f"{APP}/godot/godot_apple_embedded.entitlements", f"{APP}/godot/godot.entitlements")

          leftover_found = False
          for p in pathlib.Path(APP).rglob("*"):
              if not p.is_file() or p.suffix not in EXTS:
                  continue
              t = p.read_text(encoding="utf-8")
              o = t
              placeholders = set(re.findall(r'\$[a-zA-Z_][a-zA-Z0-9_]*', t))
              for ph in placeholders:
                  t = t.replace(ph, "")
                  leftover_found = True
                  print(f"  blanked leftover: {ph} in {p}")
              if t != o:
                  p.write_text(t, encoding="utf-8")

          if not leftover_found:
              print("No leftover placeholders found (all clean!)")
          else:
              print("Leftover placeholders were auto-cleared.")
          PYEOF

      - name: Set editor launch arguments (Info.plist)
        run: |
          set -e
          PLIST="$APP_DIR/godot/godot-Info.plist"
          /usr/libexec/PlistBuddy -c "Add :godot_editor_bootstrap_project string demo_project" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:0 string --editor" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:1 string --single-window" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:2 string --path" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:3 string \$DOCS/demo_project" "$PLIST"
          echo "Launch arguments set."

      - name: Create bundled demo project
        run: |
          set -e
          mkdir -p demo_project
          cat > demo_project/project.godot << 'PG_EOF'
          ; Engine configuration file.
          ; It's best edited using the editor UI and not directly.

          config_version=5

          [application]

          config/name="iOS Demo"
          run/main_scene="res://main.tscn"

          [rendering]

          renderer/rendering_method="mobile"
          PG_EOF
          cat > demo_project/main.tscn << 'TSCN_EOF'
          [gd_scene format=3]

          [node name="Main" type="Node2D"]

          [node name="Label" type="Label" parent="."]
          offset_left = 60.0
          offset_top = 60.0
          theme_override_font_sizes/font_size = 40
          text = "Godot iOS Editor is working!"
          TSCN_EOF

      - name: Generate app icon
        run: |
          python3 << 'PYEOF'
          import os, json
          from PIL import Image, ImageDraw

          base = "ios_app/godot/Images.xcassets/AppIcon.appiconset"
          os.makedirs(base, exist_ok=True)

          img = Image.new("RGB", (1024, 1024), (71, 140, 191))
          d = ImageDraw.Draw(img)
          d.ellipse([212, 212, 812, 812], fill=(255, 255, 255))
          d.ellipse([402, 402, 622, 622], fill=(71, 140, 191))
          img.save(os.path.join(base, "icon_1024.png"))

          json.dump(
              {"images": [{"filename": "icon_1024.png", "idiom": "universal",
                            "platform": "ios", "size": "1024x1024"}],
               "info": {"author": "xcode", "version": 1}},
              open(os.path.join(base, "Contents.json"), "w"))
          print("AppIcon.appiconset ready")
          PYEOF

      - name: Build .app with Xcode (unsigned)
        run: |
          set -e
          xcodebuild             -project "$APP_DIR/godot_apple_embedded.xcodeproj"             -scheme godot_apple_embedded             -configuration Release             -sdk iphoneos             -destination "generic/platform=iOS"             -derivedDataPath "$APP_DIR/dd"             CODE_SIGNING_ALLOWED=NO             CODE_SIGNING_REQUIRED=NO             CODE_SIGN_IDENTITY=""             DEVELOPMENT_TEAM=""             PROVISIONING_PROFILE=""             PROVISIONING_PROFILE_SPECIFIER=""             VALIDATE_PRODUCT=NO             ONLY_ACTIVE_ARCH=YES             build
          ls -lh "$APP_DIR/dd/Build/Products/Release-iphoneos/"

      - name: Package IPA
        run: |
          set -e
          APP="$APP_DIR/dd/Build/Products/Release-iphoneos/$BINARY.app"
          cp -R demo_project "$APP/demo_project"
          codesign --force --deep --sign - "$APP" 2>/dev/null || echo "ad-hoc codesign skipped"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          IPA="GodotEditor-iOS-${GODOT_REF}.ipa"
          zip -qry "$IPA" Payload
          ls -lh "$IPA"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodotEditor-iOS-ipa
          path: GodotEditor-iOS-*.ipa
          retention-days: 14

      - name: Build summary
        run: |
          {
            echo "## Godot iOS Editor — IPA ready"
            echo ""
            echo "- Godot version: \`${GODOT_REF}\`"
            echo "- Download artifact: **GodotEditor-iOS-ipa**"
            echo "- Install with: AltStore / SideStore / Sideloadly / TrollStore"
          } >> "$GITHUB_STEP_SUMMARY"
