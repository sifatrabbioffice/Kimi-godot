# =====================================================================
# Godot Editor for iOS — GitHub Actions workflow (IPA builder)
# =====================================================================
name: Godot iOS Editor (IPA)

on:
  workflow_dispatch:
    inputs:
      godot_ref:
        description: "Godot tag/branch (e.g. 4.7.1-stable)"
        required: true
        default: "4.7.1-stable"

env:
  GODOT_REF: ${{ inputs.godot_ref }}
  APP_DIR: ios_app
  BINARY: "Godot Editor"   # final .app name

jobs:
  build:
    name: Build Godot Editor IPA
    runs-on: macos-15
    timeout-minutes: 300

    steps:
      # ---- 1. টুলস ইনস্টল -----------------------------------------------
      - name: Prepare tools
        run: |
          set -e
          python3 -m venv venv
          echo "$PWD/venv/bin" >> $GITHUB_PATH
          source venv/bin/activate
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet scons pillow
          scons --version | head -n 2
          xcodebuild -version

      # ---- 2. Godot সোর্স ক্লোন ------------------------------------------
      - name: Clone Godot source
        run: git clone --depth 1 --branch "$GODOT_REF" https://github.com/godotengine/godot.git godot

      # ---- 3. ইঞ্জিন প্যাচ (বুটে সরাসরি এডিটর) ----------------------------
      - name: Patch engine (boot straight into editor)
        working-directory: godot
        run: |
          set -e
          cat > /tmp/patch_engine.py << 'SCRIPT_EOF'
          import os

          filepath = "drivers/apple_embedded/main_utilities.mm"
          with open(filepath, "r") as f:
              content = f.read()

          if "godot_bootstrap_project" in content:
              print("Already patched, skipping.")
              exit(0)

          include_line = '#include <cstdio>'
          if include_line not in content:
              print("ERROR: Could not find '#include <cstdio>'")
              exit(1)

          new_code = '\n'.join([
              '',
              'static NSString *godot_documents_dir(void) {',
              '\treturn [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];',
              '}',
              '',
              'static void godot_bootstrap_project(void) {',
              '\tNSString *proj = [[[NSBundle mainBundle] infoDictionary] objectForKey:@"godot_editor_bootstrap_project"];',
              '\tif (!proj || [proj length] == 0) return;',
              '\tNSFileManager *fm = [NSFileManager defaultManager];',
              '\tNSString *dst = [godot_documents_dir() stringByAppendingPathComponent:proj];',
              '\tif ([fm fileExistsAtPath:dst]) return;',
              '\tNSString *src = [[NSBundle mainBundle] pathForResource:proj ofType:nil];',
              '\tif (src) [fm copyItemAtPath:src toPath:dst error:nil];',
              '}',
              ''
          ])

          content = content.replace(include_line, include_line + new_code)

          old_process = "int process_args(int p_argc, char **p_args, char **r_args) {"
          new_process = "int process_args(int p_argc, char **p_args, char **r_args) {\n\tgodot_bootstrap_project();"

          if old_process not in content:
              print("ERROR: Could not find process_args function")
              exit(1)
          content = content.replace(old_process, new_process)

          lines = content.split('\n')
          new_lines = []
          for line in lines:
              new_lines.append(line)
              if 'cStringUsingEncoding:NSUTF8StringEncoding' in line and 'p_args[p_argc++]' in line:
                  indent = line[:len(line) - len(line.lstrip())]
                  new_lines.append(indent + '// Expand $DOCS/ to the Documents directory.')
                  new_lines.append(indent + 'if ([str hasPrefix:@"$DOCS/"]) {')
                  new_lines.append(indent + '\tstr = [godot_documents_dir() stringByAppendingPathComponent:[str substringFromIndex:6]];')
                  new_lines.append(indent + '}')

          content = '\n'.join(new_lines)
          with open(filepath, "w") as f:
              f.write(content)
          print("Patch applied OK")
          SCRIPT_EOF
          python3 /tmp/patch_engine.py

      # ---- 4. Godot এডিটর লাইব্রেরি কম্পাইল (iOS arm64) --------------------
      - name: Compile Godot editor library (iOS arm64)
        working-directory: godot
        run: |
          set -e
          scons platform=ios target=editor arch=arm64 vulkan=no debug_symbols=no -j"$(sysctl -n hw.logicalcpu)"
          ls -lh bin/

      # ---- 5. Xcode প্রজেক্ট সাজানো --------------------------------------
      - name: Assemble Xcode project with editor library
        run: |
          set -e
          LIB="$(ls godot/bin/libgodot.ios.editor.arm64*.a | head -n1)"
          echo "Editor library: $LIB"
          cp -R "godot/misc/dist/apple_embedded_xcode" "$APP_DIR"
          rm -rf "$APP_DIR"/libgodot.visionos.debug.xcframework \
                 "$APP_DIR"/libgodot.visionos.release.xcframework \
                 "$APP_DIR"/libgodot_camera.ios.debug.xcframework \
                 "$APP_DIR"/libgodot_camera.ios.release.xcframework \
                 "$APP_DIR"/libgodot_camera.visionos.debug.xcframework \
                 "$APP_DIR"/libgodot_camera.visionos.release.xcframework \
                 "$APP_DIR"/libgodot.ios.debug.xcframework \
                 "$APP_DIR"/libgodot.ios.release.xcframework
          mkdir -p "$APP_DIR/godot.xcframework/ios-arm64"
          cp "$LIB" "$APP_DIR/godot.xcframework/ios-arm64/libgodot.a"
          cat > "$APP_DIR/godot.xcframework/Info.plist" << 'XCF_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>AvailableLibraries</key>
          	<array>
          		<dict>
          			<key>LibraryIdentifier</key>
          			<string>ios-arm64</string>
          			<key>LibraryPath</key>
          			<string>libgodot.a</string>
          			<key>SupportedArchitectures</key>
          			<array>
          				<string>arm64</string>
          			</array>
          			<key>SupportedPlatform</key>
          			<string>ios</string>
          		</dict>
          	</array>
          	<key>CFBundlePackageType</key>
          	<string>XFWK</string>
          	<key>XCFrameworkFormatVersion</key>
          	<string>1.0</string>
          </dict>
          </plist>
          XCF_EOF
          mv "$APP_DIR/data.pck" "$APP_DIR/godot.pck"

      # ---- 6. placeholder replace + scheme fix (কোনো pbxproj API নয়) ----
      - name: Replace placeholders and fix scheme
        run: |
          set -e
          python3 << 'PYEOF'
          import os, re
          from pathlib import Path

          APP = "ios_app"

          # সম্পূর্ণ placeholder ম্যাপিং
          mapping = {
              "$pbx_launch_screen_file_reference":
                  '90DD2D9D24B36E8000717FE1 /* Launch Screen.storyboard */ = {isa = PBXFileReference; fileEncoding = 4; lastKnownFileType = file.storyboard; path = "Launch Screen.storyboard"; sourceTree = "<group>"; };',
              "$pbx_launch_screen_copy_files":
                  '90DD2D9D24B36E8000717FE1 /* Launch Screen.storyboard */,',
              "$pbx_launch_screen_build_phase":
                  '90DD2D9E24B36E8000717FE1 /* Launch Screen.storyboard in Resources */,',
              "$pbx_launch_screen_build_reference":
                  '90DD2D9E24B36E8000717FE1 /* Launch Screen.storyboard in Resources */ = {isa = PBXBuildFile; fileRef = 90DD2D9D24B36E8000717FE1 /* Launch Screen.storyboard */; };',
              "$moltenvk_buildfile": "", "$moltenvk_fileref": "",
              "$moltenvk_buildphase": "", "$moltenvk_buildgrp": "",
              "$modules_buildfile": "", "$modules_fileref": "",
              "$modules_buildphase": "", "$modules_buildgrp": "",
              "$additional_pbx_files": "", "$additional_pbx_frameworks_build": "",
              "$additional_pbx_frameworks_refs": "", "$additional_pbx_resources_refs": "",
              "$additional_pbx_resources_build": "",
              "$pbx_locale_file_reference": "", "$pbx_locale_build_reference": "",
              "$pbx_embeded_frameworks": "",
              "$os_deployment_target": "IPHONEOS_DEPLOYMENT_TARGET = 15.0;",
              "$targeted_device_family": "1,2",
              "$valid_archs": "arm64",
              "$godot_archs": "arm64",
              "$linker_flags": "",
              "$sdkroot": "iphoneos",
              "$team_id": "",
              "$code_sign_identity_debug": "", "$code_sign_identity_release": "",
              "$code_sign_style_debug": "Manual", "$code_sign_style_release": "Manual",
              "$provisioning_profile_uuid_debug": "", "$provisioning_profile_uuid_release": "",
              "$provisioning_profile_specifier_debug": "", "$provisioning_profile_specifier_release": "",
              "$provisioning_profile_uuid": "",
              "$priv_api_types": "", "$priv_collection": "", "$priv_tracking": "",
              "$bundle_identifier": "org.godotengine.ioseditor",
              "$short_version": "4.7.1", "$version": "4.7.1",
              "$signature": "????",
              "$docs_in_place": "<true/>", "$docs_sharing": "<true/>",
              "$required_device_capabilities": "<string>arm64</string>",
              "$camera_usage_description": "Godot projects can use the camera.",
              "$photolibrary_usage_description": "Godot projects can use the photo library.",
              "$microphone_usage_description": "Godot projects can use the microphone.",
              "$interface_orientations":
                  "<string>UIInterfaceOrientationPortrait</string>\n\t\t<string>UIInterfaceOrientationPortraitUpsideDown</string>\n\t\t<string>UIInterfaceOrientationLandscapeLeft</string>\n\t\t<string>UIInterfaceOrientationLandscapeRight</string>",
              "$ipad_interface_orientations":
                  "<string>UIInterfaceOrientationPortrait</string>\n\t\t<string>UIInterfaceOrientationPortraitUpsideDown</string>\n\t\t<string>UIInterfaceOrientationLandscapeLeft</string>\n\t\t<string>UIInterfaceOrientationLandscapeRight</string>",
              "$additional_plist_content": "",
              "$entitlements_full": "",
              "$cpp_code": "",
              "$default_build_config": "Release",
              "$binary": "Godot Editor",
              "$name": "Godot Editor",
              "$godot_path": "Godot Editor",
              "$godot_name": "Godot Editor",
              "$godot_binary": "Godot Editor",
              "$export_method": "development",
              "$plist_bundle_identifier": "org.godotengine.ioseditor",
              "$plist_bundle_name": "Godot Editor",
              "$plist_bundle_display_name": "Godot Editor",
              "$plist_bundle_version": "4.7.1",
              "$plist_bundle_short_version": "4.7.1",
          }

          EXTENSIONS = {".pbxproj", ".xcscheme", ".plist", ".storyboard",
                        ".strings", ".swift", ".cpp", ".h", ".entitlements",
                        ".xcworkspacedata", ".xcprivacy", ".json", ".xml",
                        ".md", ".txt", ".mm", ".m", ".xcconfig", ".hpp",
                        ".inl", ".def", ".modulemap"}

          def safe_read_text(path):
              try: return path.read_text(encoding="utf-8")
              except: return None

          def safe_write_text(path, text):
              try: path.write_text(text, encoding="utf-8"); return True
              except: return False

          # Replace in all relevant files
          for f in Path(APP).rglob("*"):
              if not f.is_file() or f.suffix.lower() not in EXTENSIONS:
                  continue
              text = safe_read_text(f)
              if text is None: continue
              orig = text
              for k, v in mapping.items():
                  text = text.replace(k, v)
              if text != orig:
                  safe_write_text(f, text)
          print("✅ All placeholders replaced.")

          # Scheme fix: buildableName -> Godot Editor.app
          scheme_glob = list(Path(APP).rglob("*.xcscheme"))
          if scheme_glob:
              scheme_path = scheme_glob[0]
              scheme_text = scheme_path.read_text()
              scheme_text = re.sub(r'buildableName = "[^"]*"', 'buildableName = "Godot Editor.app"', scheme_text)
              scheme_path.write_text(scheme_text)
              print(f"✅ Scheme updated: {scheme_path}")
          else:
              print("⚠️  No .xcscheme found, skipping scheme fix.")
          PYEOF

      # ---- 7. Info.plist আপডেট -------------------------------------------
      - name: Set editor launch arguments (Info.plist)
        run: |
          set -e
          PLIST="$APP_DIR/godot_apple_embedded/godot_apple_embedded-Info.plist"
          /usr/libexec/PlistBuddy -c "Add :godot_editor_bootstrap_project string demo_project" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:0 string --editor" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:1 string --single-window" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:2 string --path" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :godot_cmdline:3 string \$DOCS/demo_project" "$PLIST"

      # ---- 8. অ্যাপ আইকন -------------------------------------------------
      - name: Generate app icon
        run: |
          python3 << 'PYEOF'
          import os, json
          from PIL import Image, ImageDraw
          base = "ios_app/godot_apple_embedded/Images.xcassets/AppIcon.appiconset"
          os.makedirs(base, exist_ok=True)
          img = Image.new("RGB", (1024, 1024), (71, 140, 191))
          d = ImageDraw.Draw(img)
          d.ellipse([212, 212, 812, 812], fill=(255, 255, 255))
          d.ellipse([402, 402, 622, 622], fill=(71, 140, 191))
          img.save(os.path.join(base, "icon_1024.png"))
          json.dump({"images":[{"filename":"icon_1024.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}, open(os.path.join(base, "Contents.json"), "w"))
          PYEOF

      # ---- 9. ডেমো প্রজেক্ট ---------------------------------------------
      - name: Create bundled demo project
        run: |
          mkdir -p demo_project
          cat > demo_project/project.godot << 'PG_EOF'
          ; Engine configuration file.
          config_version=5
          [application]
          config/name="iOS Demo"
          run/main_scene="res://main.tscn"
          [rendering]
          renderer/rendering_method="mobile"
          PG_EOF
          cat > demo_project/main.tscn << 'TSCN_EOF'
          [gd_scene format=3]
          [node name="Main" type="Node2D"]
          [node name="Label" type="Label" parent="."]
          offset_left = 60.0
          offset_top = 60.0
          theme_override_font_sizes/font_size = 40
          text = "Godot iOS Editor is working!"
          TSCN_EOF

      # ---- 10. Xcode বিল্ড -----------------------------------------------
      - name: Build .app with Xcode (unsigned)
        run: |
          set -e
          xcodebuild \
            -project "$APP_DIR/godot_apple_embedded.xcodeproj" \
            -scheme godot_apple_embedded \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$APP_DIR/dd" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            VALIDATE_PRODUCT=NO \
            ONLY_ACTIVE_ARCH=YES \
            build
          ls -lh "$APP_DIR/dd/Build/Products/Release-iphoneos/"

      # ---- 11. IPA প্যাকেজ -----------------------------------------------
      - name: Package IPA
        run: |
          set -e
          APP="$APP_DIR/dd/Build/Products/Release-iphoneos/$BINARY.app"
          cp -R demo_project "$APP/demo_project"
          codesign --force --deep --sign - "$APP" 2>/dev/null || echo "ad-hoc codesign skipped"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          IPA="GodotEditor-iOS-${GODOT_REF}.ipa"
          zip -qry "$IPA" Payload
          ls -lh "$IPA"

      # ---- 12. আর্টিফ্যাক্ট ----------------------------------------------
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodotEditor-iOS-ipa
          path: GodotEditor-iOS-*.ipa
          retention-days: 14

      - name: Build summary
        run: |
          {
            echo "## Godot iOS Editor — IPA ready"
            echo ""
            echo "- Godot version: \`${GODOT_REF}\`"
            echo "- Download artifact: **GodotEditor-iOS-ipa**"
            echo "- Install with: AltStore / SideStore / Sideloadly / TrollStore"
          } >> "$GITHUB_STEP_SUMMARY"
